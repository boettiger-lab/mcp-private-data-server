# Secret template for the private MCP server.
#
# DO NOT commit this file with real values.
# Fill in the base64-encoded values below and apply with:
#
#   kubectl apply -f k8s/secret.yaml
#
# To base64-encode a value (no trailing newline):
#   echo -n 'your-value-here' | base64
#
# The real secret file (k8s/secret.yaml) is listed in .gitignore.

apiVersion: v1
kind: Secret
metadata:
  name: mcp-private-secrets
type: Opaque
data:
  # S3 credentials for the private bucket (base64-encoded)
  aws-access-key-id: <base64-encoded-key-id>
  aws-secret-access-key: <base64-encoded-secret-key>

  # Bearer token clients must send as: Authorization: Bearer <token>
  mcp-auth-token: <base64-encoded-token>
